<!DOCTYPE html>
<html lang="en" data-scene="overworld">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethan Yang</title>
  <link rel="icon" type="image/png" href="assets/favicon.png?v=2">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Splash screen -->
  <div id="splash-screen">
    <img id="splash-logo" src="assets/logo.png" alt="Logo">
    <div id="splash-hint">please view on desktop!!!</div>
  </div>

  <!-- Three.js panorama canvas inserted here by panorama.js -->
  <div id="panorama-container"></div>

  <!-- Vignette overlay -->
  <div id="vignette"></div>

  <!-- Music Player Widget -->
  <div id="music-player">
    <div id="player-top">
      <div id="player-info">
        <div id="player-track">Mice on Venus</div>
        <div id="player-artist">C418</div>
      </div>
      <div id="player-controls">
        <button id="btn-prev" class="player-btn" title="Previous">&#9664;&#9664;</button>
        <button id="btn-play-small" class="player-btn" title="Play/Pause">&#9654;</button>
        <button id="btn-next" class="player-btn" title="Next">&#9654;&#9654;</button>
      </div>
      <input type="range" id="volume-slider" min="0" max="100" value="35" title="Volume">
    </div>
    <div id="player-bottom">
      <span id="player-current">0:00</span>
      <div id="player-progress">
        <div id="player-progress-bar"></div>
      </div>
      <span id="player-duration">0:00</span>
    </div>
  </div>

  <!-- Main Menu -->
  <div id="main-menu">
    <!-- Contact icons -->
    <div id="contact-bar">
      <span class="contact-bar-label">Contact me:</span>
      <a href="https://www.linkedin.com/in/ey6/" target="_blank" class="contact-icon" title="LinkedIn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
      <a href="mailto:ethn.yang@mail.utoronto.ca" class="contact-icon" title="Email">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      </a>
      <a href="https://github.com/e-yang6" target="_blank" class="contact-icon" title="GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      </a>
      <a href="https://x.com/e_yang6" target="_blank" class="contact-icon" title="Twitter / X">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
    </div>

    <!-- Title -->
    <div id="title-container">
      <img id="title-img" src="assets/title.png" alt="Title">
      <div id="splash-text"></div>
    </div>

    <!-- Buttons -->
    <div id="menu-buttons" class="mc-menu">
      <button class="mc-button full" data-page="about"><span class="title">About Me</span></button>
      <button class="mc-button full" data-page="projects"><span class="title">Projects</span></button>
      <button class="mc-button full" data-page="contact"><span class="title">Resume</span></button>
      <div class="double">
        <button class="mc-button full" id="btn-contactme" data-popup="contactme"><span class="title">Contact Me</span></button>
        <button class="mc-button full" id="btn-blog" data-popup="blog"><span class="title">Blog</span></button>
      </div>
      <button class="mc-button full lang" id="btn-linkedin" data-link="#">
        <span class="title"><img src="https://i.ibb.co/99187Lk/lang.png" alt="Link"></span>
      </button>
    </div>
  </div>

  <!-- Outside #main-menu so fixed positioning uses the viewport (opacity on main-menu breaks fixed children). -->
  <div id="menu-dock" class="menu-dock">
    <div id="menu-footer" class="menu-footer">
      <div id="scene-switch" class="scene-switch scene-switch--menu" role="group" aria-label="World scene">
        <div class="scene-switch-title">World</div>
        <div class="scene-switch-row">
          <button type="button" class="mc-button scene-mc-btn" data-scene="overworld"><span class="title">Overworld</span></button>
          <button type="button" class="mc-button scene-mc-btn" data-scene="nether"><span class="title">Nether</span></button>
          <button type="button" class="mc-button scene-mc-btn" data-scene="end"><span class="title">End</span></button>
        </div>
      </div>
      <div id="bottom-bar">
        <span id="version-text">Portfolio v1.0</span>
        <a id="site-badge-link" href="./" title="Ethan Yang — portfolio home">
          <img id="site-badge" src="badge.gif" alt="Ethan Yang portfolio badge" width="88" height="31" decoding="async">
        </a>
        <span id="copyright-text">Made with &lt;3 using HTML, CSS, and Three.js. Not affiliated with Mojang.</span>
      </div>
    </div>
  </div>
  <!-- Sibling of #menu-dock (not inside it): footer strip and font toggle are positioned independently. -->
  <button class="mc-button" id="font-toggle" type="button"><span class="title">Friendly Font: Off</span></button>

  <!-- Sub-page overlay -->
  <div id="sub-page-overlay" class="hidden">
    <div id="sub-page-bg"></div>
    <div id="sub-page-content">
      <nav id="sub-page-nav" class="sub-page-nav" aria-label="Jump to section">
        <button type="button" class="mc-button sub-page-nav-btn" data-sub-nav-page="about"><span class="title">About Me</span></button>
        <button type="button" class="mc-button sub-page-nav-btn" data-sub-nav-page="projects"><span class="title">Projects</span></button>
        <button type="button" class="mc-button sub-page-nav-btn" data-sub-nav-page="contact"><span class="title">Resume</span></button>
        <button type="button" class="mc-button sub-page-nav-btn" data-sub-nav-popup="contactme"><span class="title">Contact Me</span></button>
        <button type="button" class="mc-button sub-page-nav-btn" data-sub-nav-popup="blog"><span class="title">Blog</span></button>
      </nav>
      <button class="mc-button back-button" id="btn-back"><span class="title">← Back</span></button>
      <div id="sub-page-inner"></div>
    </div>
    <!-- Outside #sub-page-content flex column: bell anchoring is not affected by overlay layout. -->
    <div id="sub-page-bell-slot" class="sub-page-bell-slot" aria-hidden="true"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.4.1/bundles/skinview3d.bundle.min.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/panorama.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/bell.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
